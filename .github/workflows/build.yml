name: Build .ipk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: openwrt/sdk:x86-64-23.05.5
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage package into SDK
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          cd /home/build/openwrt
          mkdir -p package/luci-app-notifip
          cp -r "$WORKSPACE/Makefile" "$WORKSPACE/files" package/luci-app-notifip/

      - name: Update feeds
        shell: bash
        run: |
          cd /home/build/openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        shell: bash
        run: |
          cd /home/build/openwrt
          make defconfig

      - name: Build package
        shell: bash
        run: |
          cd /home/build/openwrt
          make package/luci-app-notifip/compile V=s

      - name: Collect .ipk
        shell: bash
        env:
          WORKSPACE: ${{ github.workspace }}
        run: |
          set -euxo pipefail
          mkdir -p "$WORKSPACE/dist"
          find /home/build/openwrt/bin -name 'luci-app-notifip*.ipk' -exec cp {} "$WORKSPACE/dist/" \;
          ls -la "$WORKSPACE/dist"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-notifip
          path: dist/*.ipk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          generate_release_notes: true
