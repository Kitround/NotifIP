name: Build .ipk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: src

      - name: Restructure repo as an OpenWrt feed
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p luci-app-notifip
          cp -r src/Makefile src/files luci-app-notifip/
          rm -rf src
          ls -R luci-app-notifip

      - name: Build .ipk with OpenWrt SDK
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: x86_64-23.05.5
          FEEDNAME: notifip_feed
          PACKAGES: luci-app-notifip
          V: s
          NO_REFRESH_CHECK: 1
          NO_SHFMT_CHECK: 1

      - name: Collect .ipk
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          find bin -name 'luci-app-notifip*.ipk' -exec cp {} dist/ \;
          ls -la dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-notifip
          path: dist/*.ipk

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          generate_release_notes: true
